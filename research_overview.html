<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ribose Team Research Overview</title>
<style>
:root {
  --bg: #f0f2f7;
  --card: #ffffff;
  --text: #1a202c;
  --muted: #718096;
  --border: #e2e8f0;
  --radius: 14px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 28px 20px;
  min-height: 100vh;
}
/* ─── HEADER ─── */
.header {
  text-align: center;
  margin-bottom: 28px;
}
.header h1 {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: #0f172a;
}
.header .sub {
  font-size: 13px;
  color: var(--muted);
  margin-top: 5px;
}
/* ─── STAT CHIPS ─── */
.stats-bar {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 28px;
}
.chip {
  background: var(--card);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.chip-dot { width: 8px; height: 8px; border-radius: 50%; }
/* ─── LEGEND ─── */
.legend {
  display: flex;
  justify-content: center;
  gap: 18px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--muted);
}
.legend-phase {
  width: 16px;
  height: 16px;
  border-radius: 4px;
  border: 1.5px solid;
  display: inline-block;
}
/* ─── PROJECTS GRID ─── */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
  gap: 18px;
  max-width: 1320px;
  margin: 0 auto;
}
/* ─── PROJECT CARD ─── */
.project-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow 0.2s, transform 0.15s;
}
.project-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.13); }
/* ─── CARD HEADER (always visible) ─── */
.card-header {
  display: flex;
  align-items: flex-start;
  padding: 18px 18px 0 18px;
  gap: 14px;
  cursor: pointer;
  user-select: none;
  border-left: 5px solid transparent;
}
.card-header:hover { background: rgba(0,0,0,0.015); }
.project-icon {
  width: 44px;
  height: 44px;
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  opacity: 0.85;
}
.card-title-area { flex: 1; }
.proj-name {
  font-size: 15px;
  font-weight: 700;
  line-height: 1.3;
  color: #0f172a;
}
.proj-desc {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
  line-height: 1.4;
}
.proj-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 7px;
}
.badge {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 9px;
  border-radius: 12px;
  letter-spacing: 0.2px;
}
.badge-active   { background: #FEF3C7; color: #B45309; }
.badge-paper    { background: #DBEAFE; color: #1D4ED8; }
.badge-done     { background: #DCFCE7; color: #15803D; }
.badge-support  { background: #F3F4F6; color: #6B7280; }
.badge-person   { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
.expand-btn {
  width: 26px;
  height: 26px;
  border-radius: 7px;
  background: var(--bg);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: var(--muted);
  flex-shrink: 0;
  transition: transform 0.25s, background 0.15s;
  margin-top: 2px;
}
.project-card.open .expand-btn { transform: rotate(180deg); background: #EEF2FF; color: #4F46E5; }
/* ─── CARD STATS (mini row) ─── */
.card-stats {
  display: flex;
  gap: 14px;
  padding: 10px 18px 14px 76px;
  font-size: 12px;
  color: var(--muted);
}
.card-stats span { display: flex; align-items: center; gap: 4px; }
.card-stats .num { font-weight: 700; }
.num-red { color: #DC2626 !important; }
.num-yellow { color: #D97706 !important; }
.num-green { color: #16A34A !important; }
/* ─── DETAIL PANEL ─── */
.card-detail {
  display: none;
  padding: 0 18px 18px;
  border-top: 1px solid var(--border);
}
.project-card.open .card-detail { display: block; }
/* ─── RESEARCH OUTLINE ─── */
.section-title {
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: #94A3B8;
  margin: 18px 0 10px;
}
.phases-flow {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 5px;
  row-gap: 8px;
}
.phase {
  border-radius: 8px;
  padding: 9px 16px;
  font-size: 14px;
  font-weight: 800;
  border: 2px solid;
  white-space: nowrap;
  position: relative;
  line-height: 1.4;
  letter-spacing: -0.2px;
  text-align: center;
}
.phase-done-summary {
  background: #F0FDF4;
  border-color: #15803D;
  color: #14532D;
  font-size: 12px;
  font-weight: 700;
  padding: 7px 14px;
  cursor: pointer;
  user-select: none;
}
.phase-done-summary:hover { background: #DCFCE7; }
.phase-active { background: #DBEAFE; border-color: #1D4ED8; color: #0c1d3d; }
.phase-plan   { background: #F1F5F9; border-color: #475569; color: #0F172A; }
.phase-done-expanded {
  display: none;
  flex-wrap: wrap;
  align-items: center;
  gap: 5px;
  row-gap: 6px;
  margin-top: 6px;
  padding: 8px 10px;
  background: #F0FDF4;
  border-radius: 8px;
  border: 1px solid #86EFAC;
  width: 100%;
}
.phase-done-expanded.open { display: flex; }
.phase-done-item {
  background: #DCFCE7;
  border: 1.5px solid #15803D;
  color: #14532D;
  font-size: 12px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 7px;
  white-space: nowrap;
}
.arrow { color: #475569; font-size: 16px; font-weight: 900; }
/* ─── TASKS ─── */
.task-list { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
.task {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 12.5px;
  border: 1px solid transparent;
}
.task-ov  { background: #FEF2F2; border-color: #FECACA; }
.task-urg { background: #FFFBEB; border-color: #FDE68A; }
.task-wk  { background: #F0F9FF; border-color: #BAE6FD; }
.task-up  { background: #F8FFF8; border-color: #BBF7D0; }
.task-nm  { background: #FAFAFA; border-color: var(--border); }
.task-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.td-ov  { background: #EF4444; }
.td-urg { background: #F59E0B; }
.td-wk  { background: #0EA5E9; }
.td-up  { background: #22C55E; }
.td-nm  { background: #CBD5E1; }
.task-name { flex: 1; line-height: 1.4; }
.task-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
  flex-shrink: 0;
}
.task-due { font-size: 11px; white-space: nowrap; font-weight: 600; }
.due-ov  { color: #DC2626; }
.due-urg { color: #D97706; }
.due-wk  { color: #0284C7; }
.due-up  { color: #16A34A; }
.due-nm  { color: var(--muted); }
.task-person {
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 8px;
  background: var(--bg);
  color: var(--muted);
  border: 1px solid var(--border);
}
.no-active {
  text-align: center;
  color: var(--muted);
  font-size: 12px;
  padding: 14px;
  background: #F9FAFB;
  border-radius: 8px;

/* ─── PROGRESS BAR ─── */
.progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 18px 14px 76px;
}
.progress-track {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
}
.progress-label { font-size: 12px; font-weight: 700; min-width: 36px; text-align: right; }
/* ─── FILTER TABS ─── */
.filter-bar {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--card);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--muted);
}
.filter-btn:hover, .filter-btn.active {
  background: #1a202c;
  color: white;
  border-color: #1a202c;
}
.project-card.hidden { display: none; }
/* ─── RESPONSIVE ─── */
@media (max-width: 600px) {
  .projects-grid { grid-template-columns: 1fr; }
  body { padding: 16px 12px; }
}
</style>

<script>
const TODAY = new Date('2026-03-02');

function daysDiff(dueDateStr) {
  if (!dueDateStr) return null;
  const d = new Date(dueDateStr);
  return Math.round((d - TODAY) / 86400000);
}

function taskClass(dueDateStr) {
  const d = daysDiff(dueDateStr);
  if (d === null) return 'task-nm';
  if (d < 0) return 'task-ov';
  if (d <= 1) return 'task-urg';
  if (d <= 7) return 'task-wk';
  if (d <= 30) return 'task-up';
  return 'task-nm';
}

function dotClass(dueDateStr) {
  const d = daysDiff(dueDateStr);
  if (d === null) return 'td-nm';
  if (d < 0) return 'td-ov';
  if (d <= 1) return 'td-urg';
  if (d <= 7) return 'td-wk';
  if (d <= 30) return 'td-up';
  return 'td-nm';
}

function dueClass(dueDateStr) {
  const d = daysDiff(dueDateStr);
  if (d === null) return 'due-nm';
  if (d < 0) return 'due-ov';
  if (d <= 1) return 'due-urg';
  if (d <= 7) return 'due-wk';
  if (d <= 30) return 'due-up';
  return 'due-nm';
}

function dueLabel(dueDateStr) {
  const d = daysDiff(dueDateStr);
  if (d === null) return '기한 없음';
  if (d < 0) return `마감 D+${Math.abs(d)} 초과`;
  if (d === 0) return '오늘 마감';
  if (d === 1) return '내일 마감';
  return dueDateStr + ` (D-${d})`;
}

function countTasks(tasks) {
  let overdue = 0, urgent = 0, week = 0, up = 0, none = 0;
  tasks.forEach(t => {
    const d = daysDiff(t.due);
    if (d === null) none++;
    else if (d < 0) overdue++;
    else if (d <= 1) urgent++;
    else if (d <= 7) week++;
    else up++;
  });
  return { overdue, urgent, week, up, none };
}

let phaseExpandCounter = 0;
function buildPhaseFlow(phases) {
  const donePhases = phases.filter(p => p.status === 'done');
  const restPhases = phases.filter(p => p.status !== 'done');
  const uid = 'pex' + (phaseExpandCounter++);
  let html = '';

  if (donePhases.length > 0) {
    const doneItems = donePhases.map(p =>
      `<span class="phase-done-item">${p.label.replace(/\n/g, ' ')}</span>`
    ).join('');
    const hasRest = restPhases.length > 0;
    html += `<div class="phase-item" style="display:flex;flex-direction:column;align-items:flex-start;width:100%;gap:0">
      <div style="display:flex;align-items:center;gap:5px">
        <div class="phase phase-done-summary" onclick="togglePhaseExpand('${uid}')" title="클릭해서 펼치기">
          ✓ ${donePhases.length}단계 완료 ▸
        </div>
        ${hasRest ? '<span class="arrow">›</span>' : ''}
      </div>
      <div class="phase-done-expanded" id="${uid}">${doneItems}</div>
    </div>`;
  }

  restPhases.forEach((ph, i) => {
    const cls = ph.status === 'active' ? 'phase-active' : 'phase-plan';
    const label = ph.label.replace(/\n/g, '<br>');
    const arrow = i < restPhases.length - 1 ? `<span class="arrow">›</span>` : '';
    html += `<div class="phase-item">
      <div class="phase ${cls}">${label}</div>${arrow}
    </div>`;
  });

  return html;
}

function togglePhaseExpand(uid) {
  const el = document.getElementById(uid);
  if (el) el.classList.toggle('open');
}

function buildLegendRow() {
  return `<div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap">
    <span style="font-size:11px;display:flex;align-items:center;gap:5px">
      <span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#DCFCE7;border:2px solid #16A34A"></span>
      <span style="color:#052e16;font-weight:700">완료</span>
    </span>
    <span style="font-size:11px;display:flex;align-items:center;gap:5px">
      <span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#DBEAFE;border:2px solid #2563EB"></span>
      <span style="color:#0c1d3d;font-weight:700">진행 중</span>
    </span>
    <span style="font-size:11px;display:flex;align-items:center;gap:5px">
      <span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#FFFFFF;border:2px solid #64748B"></span>
      <span style="color:#1E293B;font-weight:700">계획</span>
    </span>
  </div>`;
}

function buildTasks(tasks, projGid) {
  if (tasks.length === 0) return `<div class="no-active">진행 중인 태스크 없음 (완료 단계)</div>`;
  return tasks.map(t => {
    const tc = taskClass(t.due);
    const dc = dotClass(t.due);
    const dueC = dueClass(t.due);
    const dueText = t.due ? dueLabel(t.due) : '기한 미정';
    const asanaLink = t.gid
      ? `<a href="https://app.asana.com/0/${projGid}/${t.gid}" target="_blank"
           onclick="event.stopPropagation()"
           style="font-size:10px;color:#7C3AED;text-decoration:none;opacity:0.75;margin-top:2px">↗ Asana</a>`
      : '';
    return `<div class="task ${tc}">
      <div class="task-dot ${dc}"></div>
      <div class="task-name">${t.name}</div>
      <div class="task-right">
        <span class="task-due ${dueC}">${dueText}</span>
        <span class="task-person">${t.assignee}</span>
        ${asanaLink}
      </div>
    </div>`;
  }).join('');
}

function buildCard(proj) {
  const counts = countTasks(proj.tasks);
  const totalActive = proj.tasks.filter(t => t.due || true).length;

  const statsHtml = `
    <div class="card-stats">
      <span>태스크 <span class="num">${totalActive}</span></span>
      ${counts.overdue ? `<span>초과 <span class="num num-red">${counts.overdue}</span></span>` : ''}
      ${counts.urgent  ? `<span>긴급 <span class="num num-yellow">${counts.urgent}</span></span>` : ''}
      ${counts.week    ? `<span>이번주 <span class="num" style="color:#0284C7">${counts.week}</span></span>` : ''}
      ${counts.up      ? `<span>예정 <span class="num num-green">${counts.up}</span></span>` : ''}
    </div>`;

  const progressColor = proj.progress === 100 ? '#22C55E'
                      : proj.progress >= 70 ? '#3B82F6'
                      : proj.progress >= 40 ? '#F59E0B'
                      : '#EF4444';
  const progressHtml = proj.progress !== null ? `
    <div class="progress-row">
      <div class="progress-track">
        <div class="progress-fill" style="width:${proj.progress}%;background:${progressColor}"></div>
      </div>
      <span class="progress-label" style="color:${progressColor}">${proj.progress}%</span>
    </div>` : '';

  const teamBadges = proj.team.map(t =>
    `<span class="badge badge-person">${t}</span>`).join('');

  return `
  <div class="project-card" id="${proj.id}" data-badge="${proj.statusBadge}">
    <div class="card-header" style="border-left-color:${proj.color}" onclick="toggleCard('${proj.id}')">
      <div class="project-icon" style="background:${proj.iconBg}">${proj.icon}</div>
      <div class="card-title-area">
        <div class="proj-name">${proj.name}</div>
        <div class="proj-desc">${proj.description}</div>
        <div class="proj-badges">
          <span class="badge ${proj.statusBadge}">${proj.statusLabel}</span>
          ${teamBadges}
          <a href="https://app.asana.com/0/${proj.asanaGid}" target="_blank"
             onclick="event.stopPropagation()"
             style="font-size:11px;font-weight:600;color:#6D28D9;text-decoration:none;background:#EDE9FE;padding:2px 9px;border-radius:12px;border:1px solid #C4B5FD;white-space:nowrap">
            Asana ↗
          </a>
        </div>
      </div>
      <div class="expand-btn" id="btn-${proj.id}">▼</div>
    </div>
    ${progressHtml}
    ${statsHtml}
    <div class="card-detail" id="detail-${proj.id}">
      <div class="section-title">연구 아웃라인 / 단계 흐름</div>
      ${buildLegendRow()}
      <div class="phases-flow">${buildPhaseFlow(proj.phases)}</div>
      <div class="section-title" style="margin-top:20px">활성 태스크 (마감 기준 정렬)</div>
      <div class="task-list">${buildTasks(proj.tasks, proj.asanaGid)}</div>
    </div>
  </div>`;
}

function toggleCard(id) {
  const card = document.getElementById(id);
  card.classList.toggle('open');
}

function filterProjects(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.project-card').forEach(card => {
    if (type === 'all') {
      card.classList.remove('hidden');
    } else {
      const badge = card.dataset.badge;
      card.classList.toggle('hidden', badge !== type);
    }
  });
}

const grid = document.getElementById('grid');
grid.innerHTML = projects.map(buildCard).join('');

projects.forEach(proj => {
  if (proj.statusBadge !== 'badge-done') {
    const card = document.getElementById(proj.id);
    if (card) card.classList.add('open');
  }
